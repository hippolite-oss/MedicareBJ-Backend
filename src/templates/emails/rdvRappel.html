<!DOCTYPE html>
<html lang="fr"><head><meta charset="UTF-8"><title>Rappel RDV - MediCare BJ</title></head>
<body style="margin:0;padding:0;background:#f5f7fa;font-family:Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#f5f7fa;padding:40px 0;">
    <tr><td align="center">
      <table width="600" cellpadding="0" cellspacing="0" style="background:#fff;border-radius:12px;overflow:hidden;">
        <tr><td style="background:#FF9800;padding:32px 40px;text-align:center;"><h1 style="color:#fff;margin:0;">⏰ Rappel RDV</h1></td></tr>

          <p style="color:#444;">Bonjour {{nom}},</p>
          <p style="color:#444;line-height:1.6;">Vous avez un rendez-vous médical <strong>demain</strong> :</p>
          <div style="background:#FFF3E0;border-radius:8px;padding:20px;margin:16px 0;">

            <p style="margin:4px 0;color:#444;">📅 {{date}}</p>
          </div>
          <p style="color:#888;font-size:13px;">Pensez à vous munir de votre code QR MediCare BJ pour un accès rapide à votre dossier.</p>
        </td></tr>
        <tr><td style="background:#f5f7fa;padding:20px;text-align:center;"><p style="color:#aaa;font-size:12px;margin:0;">© 2025 MediCare BJ</p></td></tr>
      </table>
    </td></tr>
  </table>
</body></html>
