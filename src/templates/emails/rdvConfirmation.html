<!DOCTYPE html>
<html lang="fr"><head><meta charset="UTF-8"><title>Confirmation RDV - MediCare BJ</title></head>
<body style="margin:0;padding:0;background:#f5f7fa;font-family:Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#f5f7fa;padding:40px 0;">
    <tr><td align="center">
      <table width="600" cellpadding="0" cellspacing="0" style="background:#fff;border-radius:12px;overflow:hidden;">
        <tr><td style="background:#1A6B8A;padding:32px 40px;text-align:center;"><h1 style="color:#fff;margin:0;">MediCare BJ</h1></td></tr>
        <tr><td style="padding:40px;">
          <h2 style="color:#1A6B8A;">Rendez-vous confirmé ✅</h2>
          <p style="color:#444;">Bonjour {{nom}},</p>
          <div style="background:#E3F2FD;border-radius:8px;padding:20px;margin:16px 0;">
            <p style="margin:0 0 8px;color:#1565C0;font-weight:bold;">Détails du rendez-vous</p>
            <p style="margin:4px 0;color:#444;">👨‍⚕️ Médecin : {{medecin}}</p>
            <p style="margin:4px 0;color:#444;">📅 Date : {{date}}</p>
            <p style="margin:4px 0;color:#444;">📋 Motif : {{motif}}</p>
          </div>
          <div style="text-align:center;margin:24px 0;">
            <a href="{{app_url}}/patient/rdv" style="background:#1A6B8A;color:#fff;padding:12px 28px;border-radius:8px;text-decoration:none;">Voir mes rendez-vous</a>
          </div>
        </td></tr>
        <tr><td style="background:#f5f7fa;padding:20px;text-align:center;"><p style="color:#aaa;font-size:12px;margin:0;">© 2025 MediCare BJ</p></td></tr>
      </table>
    </td></tr>
  </table>
</body></html>
